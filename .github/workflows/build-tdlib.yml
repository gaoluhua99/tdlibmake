name: Build TDLib for Android

# 产物: tdlib-android-<release_tag>.zip
#   ├─ jniLibs/<abi>/libtdjni.so
#   └─ java/org/drinkless/tdlib/{TdApi,Client}.java
#
# ┌──────────────────────────────────────────────────────────────────┐
# │  tdlib_ref   = tdlib/td 上游的 commit SHA 或 tag（如 v1.8.0）   │
# │  release_tag = 本项目自己的发布版本号（如 v1.8.65）              │
# │  两者完全独立，互不影响                                           │
# └──────────────────────────────────────────────────────────────────┘
#
# 触发方式:
#   1. workflow_dispatch 手动 —— 页面填写 tdlib_ref / release_tag
#   2. push tag v*        —— tdlib_ref 从 tdlib.version 文件读取
#
# 缓存策略:
#   - OpenSSL 编译产物按 (openssl版本 + ABI) 缓存
#   - ccache 按 (tdlib_ref + ABI) 缓存，加速增量重编
#
# 失败回滚:
#   - build 任意 ABI 失败 → 自动删除 git tag 和草稿 Release

on:
  workflow_dispatch:
    inputs:
      tdlib_ref:
        description: "tdlib/td 的 commit SHA 或 tag（例如 v1.8.0 或 40位SHA）"
        required: true
        default: "a17f87c4cff7b90b278d12b91ba0614383aaee82"
      release_tag:
        description: "本次 Release 版本号（例如 v1.8.65）。留空则自动生成。"
        required: false
        default: ""
      prerelease:
        description: "标记为预发布版本？"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
  push:
    tags:
      - "v*"

env:
  ANDROID_NDK_VERSION: "r26d"
  OPENSSL_VERSION: "3.2.1"
  DEFAULT_TDLIB_REF: "a17f87c4cff7b90b278d12b91ba0614383aaee82"

jobs:
  # ══════════════════════════════════════════════
  # JOB 1: 解析版本元数据
  # ══════════════════════════════════════════════
  prepare:
    runs-on: ubuntu-latest
    outputs:
      tdlib_ref:   ${{ steps.meta.outputs.tdlib_ref }}
      release_tag: ${{ steps.meta.outputs.release_tag }}
      zip_name:    ${{ steps.meta.outputs.zip_name }}
      prerelease:  ${{ steps.meta.outputs.prerelease }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version metadata
        id: meta
        run: |
          EVENT="${{ github.event_name }}"

          # ── tdlib_ref：tdlib/td 上游真实存在的 ref ──
          if [ "$EVENT" = "workflow_dispatch" ]; then
            TDLIB_REF="${{ github.event.inputs.tdlib_ref }}"
          else
            if [ -f "tdlib.version" ]; then
              TDLIB_REF="$(cat tdlib.version | tr -d '[:space:]')"
              echo "📄 从 tdlib.version 读取: ${TDLIB_REF}"
            else
              TDLIB_REF="${DEFAULT_TDLIB_REF}"
              echo "⚠️  tdlib.version 不存在，使用默认值: ${TDLIB_REF}"
            fi
          fi

          # ── release_tag：本项目版本号，与 tdlib_ref 无关 ──
          if [ "$EVENT" = "workflow_dispatch" ]; then
            INPUT_TAG="${{ github.event.inputs.release_tag }}"
            if [ -n "$INPUT_TAG" ]; then
              RELEASE_TAG="$INPUT_TAG"
            else
              RAW="$TDLIB_REF"
              if echo "$RAW" | grep -qE '^[0-9a-f]{40}$'; then
                RELEASE_TAG="tdlib-${RAW:0:8}"
              else
                RELEASE_TAG="$RAW"
              fi
            fi
            PRERELEASE="${{ github.event.inputs.prerelease }}"
          else
            RELEASE_TAG="${GITHUB_REF#refs/tags/}"
            PRERELEASE="false"
          fi

          ZIP_NAME="tdlib-android-${RELEASE_TAG}.zip"

          echo "tdlib_ref=${TDLIB_REF}"     >> $GITHUB_OUTPUT
          echo "release_tag=${RELEASE_TAG}" >> $GITHUB_OUTPUT
          echo "zip_name=${ZIP_NAME}"       >> $GITHUB_OUTPUT
          echo "prerelease=${PRERELEASE}"   >> $GITHUB_OUTPUT

          echo ""
          echo "════════════════════════════════════"
          echo "  tdlib/td ref  : ${TDLIB_REF}"
          echo "  release tag   : ${RELEASE_TAG}"
          echo "  zip filename  : ${ZIP_NAME}"
          echo "  pre-release   : ${PRERELEASE}"
          echo "════════════════════════════════════"

  # ══════════════════════════════════════════════
  # JOB 2: 并行编译各 ABI
  # ══════════════════════════════════════════════
  build:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true   # 任一 ABI 失败则立即取消其余，节省资源
      matrix:
        abi: [arm64-v8a, armeabi-v7a, x86_64, x86]
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential ccache ninja-build \
            zlib1g-dev libssl-dev gperf php-cli \
            binutils   # 提供 readelf，用于构建验证

      # ── ccache 配置 ──────────────────────────
      - name: Setup ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          # tdlib_ref + ABI 变化时缓存失效
          key: ccache-${{ matrix.abi }}-${{ needs.prepare.outputs.tdlib_ref }}
          restore-keys: |
            ccache-${{ matrix.abi }}-

      - name: Configure ccache
        run: |
          ccache --max-size=2G
          ccache --zero-stats
          # 让 cmake 能找到 ccache 包装的编译器
          echo "CC=ccache gcc"  >> $GITHUB_ENV
          echo "CXX=ccache g++" >> $GITHUB_ENV
          echo "CCACHE_DIR=$HOME/.ccache" >> $GITHUB_ENV

      # ── Android NDK ──────────────────────────
      - name: Setup Android NDK ${{ env.ANDROID_NDK_VERSION }}
        uses: nttld/setup-ndk@v1
        id: ndk
        with:
          ndk-version: ${{ env.ANDROID_NDK_VERSION }}

      # ── Checkout TDLib ───────────────────────
      - name: Checkout tdlib/td @ ${{ needs.prepare.outputs.tdlib_ref }}
        uses: actions/checkout@v4
        with:
          repository: tdlib/td
          ref: ${{ needs.prepare.outputs.tdlib_ref }}
          path: td

      # ── 预生成 TDLib 源文件 ──────────────────
      - name: Pre-generate TDLib source files (native host build)
        working-directory: td
        run: |
          mkdir -p build-pregenerate
          cd build-pregenerate
          cmake -DCMAKE_BUILD_TYPE=Release \
                -DCMAKE_C_COMPILER_LAUNCHER=ccache \
                -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
                -DTD_GENERATE_SOURCE_FILES=ON \
                -DTD_ENABLE_JNI=ON \
                -GNinja ..
          cmake --build . -- -j$(nproc)

      # ── OpenSSL 缓存 + 编译 ──────────────────
      - name: Map ABI → OpenSSL target
        id: openssl_meta
        run: |
          case "${{ matrix.abi }}" in
            arm64-v8a)   echo "target=android-arm64"  >> $GITHUB_OUTPUT ;;
            armeabi-v7a) echo "target=android-arm"    >> $GITHUB_OUTPUT ;;
            x86_64)      echo "target=android-x86_64" >> $GITHUB_OUTPUT ;;
            x86)         echo "target=android-x86"    >> $GITHUB_OUTPUT ;;
          esac
          echo "install_dir=$GITHUB_WORKSPACE/openssl-install/${{ matrix.abi }}" >> $GITHUB_OUTPUT

      - name: Cache OpenSSL compiled output
        id: cache-openssl
        uses: actions/cache@v4
        with:
          path: openssl-install/${{ matrix.abi }}
          # OpenSSL 版本 + NDK 版本 + ABI 三者任一变化则重新编译
          key: openssl-${{ env.OPENSSL_VERSION }}-ndk${{ env.ANDROID_NDK_VERSION }}-${{ matrix.abi }}

      - name: Build static OpenSSL for ${{ matrix.abi }}
        if: steps.cache-openssl.outputs.cache-hit != 'true'
        env:
          ANDROID_NDK_ROOT: ${{ steps.ndk.outputs.ndk-path }}
        run: |
          curl -fLO https://www.openssl.org/source/openssl-${{ env.OPENSSL_VERSION }}.tar.gz
          # 校验下载完整性（官方 SHA256）
          echo "83049d042a260e696f62406ac5c08bf706fd84383f945cf21bd61e9ed95c396e  openssl-${{ env.OPENSSL_VERSION }}.tar.gz" | sha256sum -c -
          tar xf openssl-${{ env.OPENSSL_VERSION }}.tar.gz
          cd openssl-${{ env.OPENSSL_VERSION }}

          TOOLCHAIN="$ANDROID_NDK_ROOT/toolchains/llvm/prebuilt/linux-x86_64"
          export PATH="$TOOLCHAIN/bin:$PATH"
          export ANDROID_NDK_HOME="$ANDROID_NDK_ROOT"

          ./Configure ${{ steps.openssl_meta.outputs.target }} \
              -D__ANDROID_API__=21 \
              no-shared no-tests \
              --prefix=${{ steps.openssl_meta.outputs.install_dir }}
          make -j$(nproc)
          make install_sw

      - name: Show OpenSSL cache status
        run: |
          if [ "${{ steps.cache-openssl.outputs.cache-hit }}" = "true" ]; then
            echo "✅ OpenSSL cache hit — skipped build"
          else
            echo "🔨 OpenSSL built from source and cached"
          fi

      # ── 编译 libtdjni.so ─────────────────────
      - name: Build libtdjni.so (${{ matrix.abi }})
        working-directory: td/example/android
        run: |
          mkdir -p build-${{ matrix.abi }}
          cd build-${{ matrix.abi }}
          OSSL=${{ steps.openssl_meta.outputs.install_dir }}
          cmake -DCMAKE_BUILD_TYPE=Release \
                -DCMAKE_TOOLCHAIN_FILE=${{ steps.ndk.outputs.ndk-path }}/build/cmake/android.toolchain.cmake \
                -DANDROID_ABI=${{ matrix.abi }} \
                -DANDROID_PLATFORM=android-21 \
                -DTD_ENABLE_JNI=ON \
                -DCMAKE_C_COMPILER_LAUNCHER=ccache \
                -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
                -DCMAKE_FIND_ROOT_PATH_MODE_INCLUDE=BOTH \
                -DCMAKE_FIND_ROOT_PATH_MODE_LIBRARY=BOTH \
                -DOPENSSL_ROOT_DIR=$OSSL \
                -DOPENSSL_INCLUDE_DIR=$OSSL/include \
                -DOPENSSL_CRYPTO_LIBRARY=$OSSL/lib/libcrypto.a \
                -DOPENSSL_SSL_LIBRARY=$OSSL/lib/libssl.a \
                -DOPENSSL_USE_STATIC_LIBS=TRUE \
                -GNinja \
                ..
          cmake --build . --target tdjni -- -j$(nproc)

      - name: Print ccache stats
        run: ccache --show-stats

      # ── 生成 Java API（仅 arm64-v8a）────────
      - name: Generate Java API (arm64-v8a only)
        if: matrix.abi == 'arm64-v8a'
        working-directory: td/example/android
        run: |
          mkdir -p build-java-native
          cd build-java-native
          cmake -DCMAKE_BUILD_TYPE=Release -GNinja ..
          cmake --build . --target tl_generate_java -- -j$(nproc)
          echo "---- generated Java files ----"
          ls -la ../org/drinkless/tdlib/
          mkdir -p ../../../../java-out/org/drinkless/tdlib
          cp ../org/drinkless/tdlib/TdApi.java  ../../../../java-out/org/drinkless/tdlib/
          cp ../../java/org/drinkless/tdlib/Client.java ../../../../java-out/org/drinkless/tdlib/

      # ── 收集产物 ─────────────────────────────
      - name: Collect libtdjni.so
        run: |
          mkdir -p out/jniLibs/${{ matrix.abi }}
          find td/example/android/build-${{ matrix.abi }} -name "libtdjni.so" \
               -exec cp {} out/jniLibs/${{ matrix.abi }}/ \;

      # ── ✅ 构建验证 ──────────────────────────
      - name: Verify libtdjni.so (${{ matrix.abi }})
        run: |
          SO="out/jniLibs/${{ matrix.abi }}/libtdjni.so"

          echo "══════════════════════════════════════"
          echo "  Verifying: $SO"
          echo "══════════════════════════════════════"

          # 1. 文件存在且非空
          [ -s "$SO" ] || { echo "❌ .so 文件不存在或为空"; exit 1; }
          echo "✅ 文件存在 ($(du -sh $SO | cut -f1))"

          # 2. 是合法 ELF 文件
          file "$SO" | grep -q "ELF" || { echo "❌ 不是有效 ELF 文件"; exit 1; }
          echo "✅ ELF 格式正确"

          # 3. 架构验证：确认编译目标 ABI 与矩阵一致
          MACHINE=$(readelf -h "$SO" | grep "Machine:" | awk '{print $2, $3}')
          echo "   Machine: $MACHINE"
          case "${{ matrix.abi }}" in
            arm64-v8a)
              readelf -h "$SO" | grep -q "AArch64" || { echo "❌ ABI 不符: 期望 AArch64"; exit 1; } ;;
            armeabi-v7a)
              readelf -h "$SO" | grep -q "ARM" || { echo "❌ ABI 不符: 期望 ARM"; exit 1; } ;;
            x86_64)
              readelf -h "$SO" | grep -q "X86-64" || { echo "❌ ABI 不符: 期望 X86-64"; exit 1; } ;;
            x86)
              readelf -h "$SO" | grep -qE "Intel 80386|80386" || { echo "❌ ABI 不符: 期望 80386"; exit 1; } ;;
          esac
          echo "✅ ABI 匹配: ${{ matrix.abi }}"

          # 4. 关键 JNI 导出符号验证
          SYMS=$(readelf -sW "$SO" | grep "GLOBAL" | grep "FUNC")
          echo "   导出函数数量: $(echo "$SYMS" | wc -l)"
          echo "$SYMS" | grep -q "Java_org_drinkless_tdlib" \
            || { echo "❌ 未找到 Java_org_drinkless_tdlib* 导出符号"; exit 1; }
          echo "✅ JNI 入口符号存在"

          # 5. 确认为 Release 构建（不含调试段）
          if readelf -S "$SO" | grep -q "\.debug_info"; then
            echo "⚠️  检测到 .debug_info 段（Debug 构建），Release 通常不含此段"
          else
            echo "✅ 无 .debug_info 段（Release 构建）"
          fi

          # 6. 确认依赖的动态库合理（不应依赖 libstdc++，应用 libc++）
          NEEDED=$(readelf -d "$SO" | grep "NEEDED" | awk '{print $5}' | tr -d '[]')
          echo "   动态依赖库:"
          echo "$NEEDED" | sed 's/^/     /'
          if echo "$NEEDED" | grep -q "libstdc++"; then
            echo "⚠️  依赖 libstdc++（通常应依赖 libc++_shared 或静态链接）"
          fi

          echo "══════════════════════════════════════"
          echo "  验证通过 ✅"
          echo "══════════════════════════════════════"

      # ── 上传 artifact ────────────────────────
      - uses: actions/upload-artifact@v4
        with:
          name: tdlib-${{ matrix.abi }}
          path: out/jniLibs/${{ matrix.abi }}/libtdjni.so

      - uses: actions/upload-artifact@v4
        if: matrix.abi == 'arm64-v8a'
        with:
          name: tdlib-java-api
          path: java-out

  # ══════════════════════════════════════════════
  # JOB 3: 失败回滚 —— 清理 tag 和草稿 Release
  # ══════════════════════════════════════════════
  rollback:
    needs: [prepare, build]
    if: failure() && needs.build.result == 'failure'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Delete git tag ${{ needs.prepare.outputs.release_tag }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ needs.prepare.outputs.release_tag }}"
          echo "🔄 构建失败，开始回滚..."

          # 删除远端 tag（若不存在则忽略）
          if git ls-remote --tags origin | grep -q "refs/tags/${TAG}$"; then
            gh api \
              --method DELETE \
              -H "Accept: application/vnd.github+json" \
              /repos/${{ github.repository }}/git/refs/tags/${TAG} \
              && echo "✅ 已删除远端 tag: ${TAG}" \
              || echo "⚠️  删除 tag 失败（可能已不存在）"
          else
            echo "ℹ️  远端 tag ${TAG} 不存在，跳过"
          fi

      - name: Delete draft Release for ${{ needs.prepare.outputs.release_tag }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ needs.prepare.outputs.release_tag }}"

          # 查找与该 tag 同名的 Release（草稿或已发布）
          RELEASE_ID=$(gh api \
            -H "Accept: application/vnd.github+json" \
            /repos/${{ github.repository }}/releases \
            --jq ".[] | select(.tag_name==\"${TAG}\") | .id" 2>/dev/null || true)

          if [ -n "$RELEASE_ID" ]; then
            gh api \
              --method DELETE \
              -H "Accept: application/vnd.github+json" \
              /repos/${{ github.repository }}/releases/${RELEASE_ID} \
              && echo "✅ 已删除 Release ID: ${RELEASE_ID} (tag: ${TAG})" \
              || echo "⚠️  删除 Release 失败"
          else
            echo "ℹ️  未找到 tag=${TAG} 的 Release，跳过"
          fi

      - name: Post rollback summary
        run: |
          echo "## ❌ 构建失败 · 已自动回滚" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 项目 | 值 |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| release_tag | \`${{ needs.prepare.outputs.release_tag }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| tdlib_ref   | \`${{ needs.prepare.outputs.tdlib_ref }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| 操作 | 已删除远端 tag 和 Release（如存在）|" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> 请检查 build job 日志，修复后重新触发。" >> $GITHUB_STEP_SUMMARY

  # ══════════════════════════════════════════════
  # JOB 4: 打包 + 发布 Release
  # ══════════════════════════════════════════════
  release:
    needs: [prepare, build]
    if: success()
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Show downloaded artifacts
        run: find artifacts -type f | sort

      - name: Assemble ${{ needs.prepare.outputs.zip_name }}
        run: |
          ZIP_NAME="${{ needs.prepare.outputs.zip_name }}"
          RELEASE_TAG="${{ needs.prepare.outputs.release_tag }}"
          TDLIB_REF="${{ needs.prepare.outputs.tdlib_ref }}"

          mkdir -p dist/jniLibs dist/java
          for abi in arm64-v8a armeabi-v7a x86_64 x86; do
            mkdir -p dist/jniLibs/$abi
            cp artifacts/tdlib-$abi/libtdjni.so dist/jniLibs/$abi/
          done
          cp -r artifacts/tdlib-java-api/* dist/java/

          cat > dist/VERSION.txt << EOF
          TDLib Android Build
          Release  : ${RELEASE_TAG}
          TDLib ref: ${TDLIB_REF}
          NDK      : ${{ env.ANDROID_NDK_VERSION }}
          OpenSSL  : ${{ env.OPENSSL_VERSION }} (static)
          Built at : $(date -u '+%Y-%m-%d %H:%M:%S UTC')
          Run ID   : ${{ github.run_id }}
          EOF

          cd dist && zip -r ../"${ZIP_NAME}" jniLibs java VERSION.txt
          echo "ZIP_SIZE=$(du -sh ../${ZIP_NAME} | cut -f1)" >> $GITHUB_ENV
          echo "✅ Created ${ZIP_NAME}"

      - name: Create GitHub Release and upload asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name:   ${{ needs.prepare.outputs.release_tag }}
          name:       "TDLib Android ${{ needs.prepare.outputs.release_tag }}"
          prerelease: ${{ needs.prepare.outputs.prerelease == 'true' }}
          generate_release_notes: false
          body: |
            ## TDLib Android — ${{ needs.prepare.outputs.release_tag }}

            | 字段 | 值 |
            |---|---|
            | tdlib/td ref  | `${{ needs.prepare.outputs.tdlib_ref }}` |
            | Android NDK   | `${{ env.ANDROID_NDK_VERSION }}` |
            | OpenSSL       | `${{ env.OPENSSL_VERSION }} (静态链接)` |
            | minSdkVersion | `21` |
            | 包大小        | `${{ env.ZIP_SIZE }}` |

            ### 包含内容

            ```
            ${{ needs.prepare.outputs.zip_name }}
            ├── jniLibs/
            │   ├── arm64-v8a/libtdjni.so
            │   ├── armeabi-v7a/libtdjni.so
            │   ├── x86_64/libtdjni.so
            │   └── x86/libtdjni.so
            ├── java/org/drinkless/tdlib/
            │   ├── TdApi.java
            │   └── Client.java
            └── VERSION.txt
            ```

            ### 接入方式
            解压后将 `jniLibs/` 复制到 `app/src/main/`，将 `java/` 内容合并到对应源码目录。
          files: ${{ needs.prepare.outputs.zip_name }}
