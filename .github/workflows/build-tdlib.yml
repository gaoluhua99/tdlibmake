name: Build TDLib for Android

# 手动触发，或推送 tag（如 v1.8.0）时自动触发
# 产物: tdlib-android-<version>.zip
#   ├─ jniLibs/<abi>/libtdjni.so   (每个ABI一份)
#   └─ java/org/drinkless/tdlib/*.java  (TDLib 自动生成的 Java API)
#
# Release 发布规则:
#   - 推送 tag (refs/tags/v*) → 自动创建 Release 并上传
#   - 手动触发(workflow_dispatch) → 同样创建/更新 Release 并上传

on:
  workflow_dispatch:
    inputs:
      tdlib_ref:
        description: "TDLib git tag/commit (e.g. v1.8.0 or commit SHA)"
        required: true
        default: "a17f87c4cff7b90b278d12b91ba0614383aaee82"
      release_tag:
        description: "Release tag name (e.g. v1.8.0). Leave empty to use tdlib_ref as tag."
        required: false
        default: ""
      prerelease:
        description: "Mark as pre-release?"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
  push:
    tags:
      - "v*"          # 推送任意 v* tag 时触发，如 v1.8.0、v1.8.0-rc1

env:
  ANDROID_NDK_VERSION: "r26d"

jobs:
  # ─────────────────────────────────────────────
  # 解析版本信息，供后续 job 共享
  # ─────────────────────────────────────────────
  prepare:
    runs-on: ubuntu-latest
    outputs:
      tdlib_ref: ${{ steps.meta.outputs.tdlib_ref }}
      version:   ${{ steps.meta.outputs.version }}
      tag_name:  ${{ steps.meta.outputs.tag_name }}
      zip_name:  ${{ steps.meta.outputs.zip_name }}
    steps:
      - name: Resolve version metadata
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            # tag push: refs/tags/v1.8.0  →  TAG=v1.8.0
            TAG="${GITHUB_REF#refs/tags/}"
            # tdlib_ref 默认与 tag 同名；如 tag 是项目自身版本则沿用默认 commit
            TDLIB_REF="${TAG}"
            VERSION="${TAG}"
          else
            # workflow_dispatch
            TDLIB_REF="${{ github.event.inputs.tdlib_ref }}"
            if [ -n "${{ github.event.inputs.release_tag }}" ]; then
              TAG="${{ github.event.inputs.release_tag }}"
            else
              # 用 tdlib_ref 做 tag；如果是完整 SHA 则截短
              RAW="${{ github.event.inputs.tdlib_ref }}"
              if echo "$RAW" | grep -qE '^[0-9a-f]{40}$'; then
                TAG="tdlib-${RAW:0:8}"
              else
                TAG="$RAW"
              fi
            fi
            VERSION="$TAG"
          fi

          # 确保 version 以 v 开头（仅用于显示/文件名）
          DISPLAY_VER="${VERSION#v}"        # 去掉前缀 v，纯数字/字符串
          ZIP_NAME="tdlib-android-${VERSION}.zip"

          echo "tdlib_ref=${TDLIB_REF}" >> $GITHUB_OUTPUT
          echo "version=${VERSION}"     >> $GITHUB_OUTPUT
          echo "tag_name=${TAG}"        >> $GITHUB_OUTPUT
          echo "zip_name=${ZIP_NAME}"   >> $GITHUB_OUTPUT

          echo "📦 tdlib_ref  : ${TDLIB_REF}"
          echo "📦 version    : ${VERSION}"
          echo "📦 tag_name   : ${TAG}"
          echo "📦 zip_name   : ${ZIP_NAME}"

  # ─────────────────────────────────────────────
  # 按 ABI 并行编译 libtdjni.so
  # ─────────────────────────────────────────────
  build:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      matrix:
        abi: [arm64-v8a, armeabi-v7a, x86_64, x86]
    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential ccache ninja-build zlib1g-dev libssl-dev gperf php-cli

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        id: ndk
        with:
          ndk-version: ${{ env.ANDROID_NDK_VERSION }}

      - name: Checkout TDLib
        uses: actions/checkout@v4
        with:
          repository: tdlib/td
          ref: ${{ needs.prepare.outputs.tdlib_ref }}
          path: td

      - name: Pre-generate TDLib auto source files (native host build)
        working-directory: td
        run: |
          mkdir -p build-pregenerate
          cd build-pregenerate
          cmake -DCMAKE_BUILD_TYPE=Release -DTD_GENERATE_SOURCE_FILES=ON -DTD_ENABLE_JNI=ON -GNinja ..
          cmake --build . -- -j$(nproc)

      - name: Map ABI to OpenSSL target
        id: openssl_meta
        run: |
          case "${{ matrix.abi }}" in
            arm64-v8a)   echo "target=android-arm64"  >> $GITHUB_OUTPUT ;;
            armeabi-v7a) echo "target=android-arm"    >> $GITHUB_OUTPUT ;;
            x86_64)      echo "target=android-x86_64" >> $GITHUB_OUTPUT ;;
            x86)         echo "target=android-x86"    >> $GITHUB_OUTPUT ;;
          esac
          echo "install_dir=$GITHUB_WORKSPACE/openssl-install/${{ matrix.abi }}" >> $GITHUB_OUTPUT

      - name: Build static OpenSSL for ${{ matrix.abi }}
        env:
          ANDROID_NDK_ROOT: ${{ steps.ndk.outputs.ndk-path }}
        run: |
          curl -LO https://www.openssl.org/source/openssl-3.2.1.tar.gz
          tar xf openssl-3.2.1.tar.gz
          cd openssl-3.2.1

          TOOLCHAIN="$ANDROID_NDK_ROOT/toolchains/llvm/prebuilt/linux-x86_64"
          export PATH="$TOOLCHAIN/bin:$PATH"
          export ANDROID_NDK_HOME="$ANDROID_NDK_ROOT"

          ./Configure ${{ steps.openssl_meta.outputs.target }} -D__ANDROID_API__=21 \
              no-shared no-tests \
              --prefix=${{ steps.openssl_meta.outputs.install_dir }}
          make -j$(nproc)
          make install_sw

      - name: Configure & build libtdjni (${{ matrix.abi }})
        working-directory: td/example/android
        run: |
          mkdir -p build-${{ matrix.abi }}
          cd build-${{ matrix.abi }}
          OSSL=${{ steps.openssl_meta.outputs.install_dir }}
          cmake -DCMAKE_BUILD_TYPE=Release \
                -DCMAKE_TOOLCHAIN_FILE=${{ steps.ndk.outputs.ndk-path }}/build/cmake/android.toolchain.cmake \
                -DANDROID_ABI=${{ matrix.abi }} \
                -DANDROID_PLATFORM=android-21 \
                -DTD_ENABLE_JNI=ON \
                -DCMAKE_FIND_ROOT_PATH_MODE_INCLUDE=BOTH \
                -DCMAKE_FIND_ROOT_PATH_MODE_LIBRARY=BOTH \
                -DOPENSSL_ROOT_DIR=$OSSL \
                -DOPENSSL_INCLUDE_DIR=$OSSL/include \
                -DOPENSSL_CRYPTO_LIBRARY=$OSSL/lib/libcrypto.a \
                -DOPENSSL_SSL_LIBRARY=$OSSL/lib/libssl.a \
                -DOPENSSL_USE_STATIC_LIBS=TRUE \
                -GNinja \
                ..
          cmake --build . --target tdjni -- -j$(nproc)

      - name: Generate Java API (arch-independent, arm64-v8a only)
        if: matrix.abi == 'arm64-v8a'
        working-directory: td/example/android
        run: |
          mkdir -p build-java-native
          cd build-java-native
          cmake -DCMAKE_BUILD_TYPE=Release -GNinja ..
          cmake --build . --target tl_generate_java -- -j$(nproc)
          echo "---- generated Java files ----"
          ls -la ../org/drinkless/tdlib/
          mkdir -p ../../../../java-out/org/drinkless/tdlib
          cp ../org/drinkless/tdlib/TdApi.java ../../../../java-out/org/drinkless/tdlib/
          cp ../../java/org/drinkless/tdlib/Client.java ../../../../java-out/org/drinkless/tdlib/

      - name: Collect libtdjni.so
        run: |
          mkdir -p out/jniLibs/${{ matrix.abi }}
          find td/example/android/build-${{ matrix.abi }} -name "libtdjni.so" \
               -exec cp {} out/jniLibs/${{ matrix.abi }}/ \;

      - uses: actions/upload-artifact@v4
        with:
          name: tdlib-${{ matrix.abi }}
          path: out/jniLibs/${{ matrix.abi }}/libtdjni.so

      - uses: actions/upload-artifact@v4
        if: matrix.abi == 'arm64-v8a'
        with:
          name: tdlib-java-api
          path: java-out

  # ─────────────────────────────────────────────
  # 打包 + 创建 GitHub Release 并上传产物
  # ─────────────────────────────────────────────
  release:
    needs: [prepare, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write   # 允许创建 Release / 上传 asset
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Show downloaded artifacts
        run: find artifacts -type f | sort

      - name: Assemble ${{ needs.prepare.outputs.zip_name }}
        run: |
          ZIP_NAME="${{ needs.prepare.outputs.zip_name }}"
          VERSION="${{ needs.prepare.outputs.version }}"

          mkdir -p dist/jniLibs dist/java
          for abi in arm64-v8a armeabi-v7a x86_64 x86; do
            mkdir -p dist/jniLibs/$abi
            cp artifacts/tdlib-$abi/libtdjni.so dist/jniLibs/$abi/ || true
          done
          cp -r artifacts/tdlib-java-api/* dist/java/ || true

          # 写入版本信息文件
          cat > dist/VERSION.txt << EOF
          TDLib Android Build
          Version  : ${VERSION}
          TDLib ref: ${{ needs.prepare.outputs.tdlib_ref }}
          Built at : $(date -u '+%Y-%m-%d %H:%M:%S UTC')
          Commit   : ${{ github.sha }}
          EOF

          cd dist && zip -r ../"${ZIP_NAME}" jniLibs java VERSION.txt
          echo "ZIP_NAME=${ZIP_NAME}" >> $GITHUB_ENV
          echo "✅ Created ${ZIP_NAME} ($(du -sh ../${ZIP_NAME} | cut -f1))"

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name:   ${{ needs.prepare.outputs.tag_name }}
          name:       "TDLib Android ${{ needs.prepare.outputs.version }}"
          prerelease: ${{ github.event.inputs.prerelease == 'true' }}
          generate_release_notes: false
          body: |
            ## TDLib Android Build — ${{ needs.prepare.outputs.version }}

            | 字段 | 值 |
            |------|-----|
            | TDLib ref | `${{ needs.prepare.outputs.tdlib_ref }}` |
            | NDK 版本 | `${{ env.ANDROID_NDK_VERSION }}` |
            | OpenSSL  | `3.2.1 (static)` |
            | Android minSdk | `21` |
            | 构建时间 | `${{ github.run_id }}` |

            ### 包含内容
            ```
            tdlib-android-${{ needs.prepare.outputs.version }}.zip
            ├── jniLibs/
            │   ├── arm64-v8a/libtdjni.so
            │   ├── armeabi-v7a/libtdjni.so
            │   ├── x86_64/libtdjni.so
            │   └── x86/libtdjni.so
            ├── java/org/drinkless/tdlib/
            │   ├── TdApi.java
            │   └── Client.java
            └── VERSION.txt
            ```

            ### 使用方式
            解压后将 `jniLibs/` 复制到 `app/src/main/`，将 `java/` 内容复制到对应源码目录即可。
          files: ${{ needs.prepare.outputs.zip_name }}
