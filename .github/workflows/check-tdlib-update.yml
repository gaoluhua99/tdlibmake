name: Check TDLib Upstream Updates

# 每天 UTC 08:00 自动检查 tdlib/td 是否有新 tag
# 若发现新版本且与当前 tdlib.version 不同，则自动提 PR 更新

on:
  schedule:
    - cron: "0 8 * * *"   # 每天 UTC 08:00
  workflow_dispatch:        # 也支持手动触发

permissions:
  contents: write
  pull-requests: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch latest tdlib/td tag
        id: upstream
        run: |
          # 获取 tdlib/td 所有 tag，找出最新的 v* 版本 tag
          LATEST_TAG=$(git ls-remote --tags https://github.com/tdlib/td \
            | grep -Eo 'refs/tags/v[0-9]+\.[0-9]+\.[0-9]+$' \
            | sed 's|refs/tags/||' \
            | sort -V \
            | tail -1)

          # 若无版本 tag，则取最新 commit SHA（main 分支）
          if [ -z "$LATEST_TAG" ]; then
            LATEST_TAG=$(git ls-remote https://github.com/tdlib/td HEAD | cut -f1)
            echo "ℹ️  未找到版本 tag，使用最新 HEAD SHA: ${LATEST_TAG}"
          fi

          echo "latest=${LATEST_TAG}" >> $GITHUB_OUTPUT
          echo "🔍 tdlib/td 最新版本: ${LATEST_TAG}"

      - name: Read current tdlib.version
        id: current
        run: |
          if [ -f "tdlib.version" ]; then
            CURRENT="$(cat tdlib.version | tr -d '[:space:]')"
          else
            CURRENT=""
          fi
          echo "version=${CURRENT}" >> $GITHUB_OUTPUT
          echo "📄 当前 tdlib.version: ${CURRENT}"

      - name: Compare versions
        id: compare
        run: |
          LATEST="${{ steps.upstream.outputs.latest }}"
          CURRENT="${{ steps.current.outputs.version }}"

          if [ "$LATEST" = "$CURRENT" ]; then
            echo "✅ 已是最新版本 (${CURRENT})，无需更新"
            echo "needs_update=false" >> $GITHUB_OUTPUT
          else
            echo "🆕 发现新版本: ${CURRENT} → ${LATEST}"
            echo "needs_update=true" >> $GITHUB_OUTPUT
          fi

      - name: Update tdlib.version and open PR
        if: steps.compare.outputs.needs_update == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          LATEST="${{ steps.upstream.outputs.latest }}"
          CURRENT="${{ steps.current.outputs.version }}"
          BRANCH="update/tdlib-${LATEST}"

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # 若该分支已存在（上次 PR 未合并）则先删除
          git push origin --delete "${BRANCH}" 2>/dev/null || true
          git checkout -b "${BRANCH}"

          echo "${LATEST}" > tdlib.version
          git add tdlib.version
          git commit -m "chore: bump tdlib to ${LATEST}

          Previous: ${CURRENT}
          Latest  : ${LATEST}

          Auto-generated by check-tdlib-update workflow."

          git push origin "${BRANCH}"

          # 创建 PR
          gh pr create \
            --title "chore: bump tdlib to ${LATEST}" \
            --body "## 自动检测到 TDLib 上游更新

          | 字段 | 值 |
          |---|---|
          | 当前版本 | \`${CURRENT}\` |
          | 最新版本 | \`${LATEST}\` |
          | 上游链接 | https://github.com/tdlib/td/releases/tag/${LATEST} |

          ### 变更内容
          请查看 [tdlib/td 更新日志](https://github.com/tdlib/td/blob/${LATEST}/CHANGELOG.md) 确认兼容性后合并此 PR。

          合并后，推送 tag 即可触发编译：
          \`\`\`bash
          git tag v<your-version>
          git push origin v<your-version>
          \`\`\`

          > 此 PR 由 [check-tdlib-update](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) workflow 自动生成。" \
            --base main \
            --head "${BRANCH}" \
            --label "dependencies,automated"

          echo "✅ PR 已创建: ${BRANCH}"

      - name: Post summary
        run: |
          LATEST="${{ steps.upstream.outputs.latest }}"
          CURRENT="${{ steps.current.outputs.version }}"
          NEEDS_UPDATE="${{ steps.compare.outputs.needs_update }}"

          echo "## TDLib 版本检查结果" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 字段 | 值 |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| 当前 tdlib.version | \`${CURRENT}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| 上游最新 tag       | \`${LATEST}\` |" >> $GITHUB_STEP_SUMMARY
          if [ "$NEEDS_UPDATE" = "true" ]; then
            echo "| 状态 | 🆕 已自动创建更新 PR |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| 状态 | ✅ 已是最新版本 |" >> $GITHUB_STEP_SUMMARY
          fi
