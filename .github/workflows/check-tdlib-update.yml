name: Check TDLib Upstream Updates

# 跟踪 tdlib/td 的 CMakeLists.txt 中的 project(TDLib VERSION x.x.x)
#
# 发现新版本后：
#   1. 直接 commit tdlib.version 到 main（保留更新记录）
#   2. 通过 workflow_dispatch API 直接调用 build-tdlib.yml 开始编译
#      （绕过 GitHub 限制：bot commit 的 push 不会触发其他 workflow）

on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:

permissions:
  contents: write
  actions: write    # 允许调用 gh workflow run 触发其他 workflow

env:
  TDLIB_REPO: "tdlib/td"
  TDLIB_BRANCH: "master"

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch tdlib/td version from CMakeLists.txt
        id: upstream
        run: |
          HEAD_SHA=$(git ls-remote https://github.com/${{ env.TDLIB_REPO }}.git \
            refs/heads/${{ env.TDLIB_BRANCH }} | cut -f1)

          if [ -z "$HEAD_SHA" ]; then
            echo "ERROR: Failed to fetch HEAD SHA"
            exit 1
          fi

          CMAKE_URL="https://raw.githubusercontent.com/${{ env.TDLIB_REPO }}/${HEAD_SHA}/CMakeLists.txt"
          CMAKE_CONTENT=$(curl -fsSL "$CMAKE_URL")

          VERSION=$(echo "$CMAKE_CONTENT" \
            | grep -oP 'project\s*\(\s*TDLib\s+VERSION\s+\K[0-9]+\.[0-9]+\.[0-9]+')

          if [ -z "$VERSION" ]; then
            echo "ERROR: Could not extract version from CMakeLists.txt"
            exit 1
          fi

          echo "sha=${HEAD_SHA}"           >> $GITHUB_OUTPUT
          echo "sha_short=${HEAD_SHA:0:7}" >> $GITHUB_OUTPUT
          echo "version=${VERSION}"         >> $GITHUB_OUTPUT
          echo "Upstream: v${VERSION} (${HEAD_SHA:0:7})"

      - name: Read current tdlib.version
        id: current
        run: |
          if [ -f "tdlib.version" ]; then
            RAW="$(cat tdlib.version | tr -d '\r')"
            CURRENT_SHA=$(echo "$RAW" | awk '{print $1}')
            CURRENT_VER=$(echo "$RAW" | grep -oP 'v\K[0-9]+\.[0-9]+\.[0-9]+' || true)
          else
            CURRENT_SHA=""
            CURRENT_VER=""
          fi
          echo "sha=${CURRENT_SHA}"     >> $GITHUB_OUTPUT
          echo "version=${CURRENT_VER}" >> $GITHUB_OUTPUT
          echo "Current: v${CURRENT_VER:-unknown} (${CURRENT_SHA:0:7})"

      - name: Compare
        id: compare
        run: |
          if [ "${{ steps.upstream.outputs.sha }}" = "${{ steps.current.outputs.sha }}" ]; then
            echo "Already up to date: v${{ steps.current.outputs.version }}"
            echo "needs_update=false" >> $GITHUB_OUTPUT
          else
            echo "Update: v${{ steps.current.outputs.version }} -> v${{ steps.upstream.outputs.version }}"
            echo "needs_update=true" >> $GITHUB_OUTPUT
          fi

      # Step 1: commit tdlib.version 到 main（更新版本记录）
      - name: Commit new tdlib.version to main
        if: steps.compare.outputs.needs_update == 'true'
        run: |
          LATEST_SHA="${{ steps.upstream.outputs.sha }}"
          LATEST_VER="${{ steps.upstream.outputs.version }}"
          CURRENT_SHA="${{ steps.current.outputs.sha }}"
          CURRENT_VER="${{ steps.current.outputs.version }}"

          git remote set-url origin \
            "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          echo "${LATEST_SHA} # v${LATEST_VER}" > tdlib.version
          git add tdlib.version
          git commit -m "chore: bump tdlib to v${LATEST_VER}

          Previous: v${CURRENT_VER:-unknown} (${CURRENT_SHA:0:7})
          Latest  : v${LATEST_VER} (${LATEST_SHA:0:7})

          Source: tdlib/td master CMakeLists.txt
          Diff: https://github.com/tdlib/td/compare/${CURRENT_SHA}...${LATEST_SHA}"

          git push origin main
          echo "Committed v${LATEST_VER} to main"

      # Step 2: 通过 API 直接触发 build-tdlib.yml
      # gh workflow run 内部使用 workflow_dispatch API，不受 bot push 限制
      - name: Trigger build-tdlib.yml
        if: steps.compare.outputs.needs_update == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          LATEST_SHA="${{ steps.upstream.outputs.sha }}"
          LATEST_VER="${{ steps.upstream.outputs.version }}"

          echo "Dispatching build for v${LATEST_VER} (${LATEST_SHA:0:7})..."

          gh workflow run build-tdlib.yml \
            --ref main \
            --field tdlib_ref="${LATEST_SHA}" \
            --field release_tag="v${LATEST_VER}" \
            --field prerelease="false"

          echo "Build dispatched: v${LATEST_VER}"

      - name: Post summary
        if: always()
        run: |
          LATEST_SHA="${{ steps.upstream.outputs.sha }}"
          LATEST_VER="${{ steps.upstream.outputs.version }}"
          CURRENT_SHA="${{ steps.current.outputs.sha }}"
          CURRENT_VER="${{ steps.current.outputs.version }}"
          NEEDS_UPDATE="${{ steps.compare.outputs.needs_update }}"

          {
            echo "## TDLib Version Check"
            echo ""
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| Current  | v${CURRENT_VER:-unknown} (\`${CURRENT_SHA:0:7}\`) |"
            echo "| Upstream | v${LATEST_VER} (\`${LATEST_SHA:0:7}\`) |"
            if [ "$NEEDS_UPDATE" = "true" ]; then
              echo "| Status | New version — build dispatched |"
              echo "| Diff | [Compare](https://github.com/tdlib/td/compare/${CURRENT_SHA}...${LATEST_SHA}) |"
            else
              echo "| Status | Already up to date |"
            fi
          } >> $GITHUB_STEP_SUMMARY
